services:
  desktop:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: liftoff-desktop
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme}
      - DISPLAY=:1
      - RESOLUTION=1920x1080x24
    volumes:
      - steam-data:/home/gamer/.steam
      - liftoff-mods:/home/gamer/.steam/steam/steamapps/common/Liftoff/BepInEx/plugins
    ports:
      - "127.0.0.1:6901:6901"
    shm_size: "2g"
    privileged: true
    restart: unless-stopped

  desktop2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: liftoff-desktop-2
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD_2:-changeme}
      - DISPLAY=:1
      - RESOLUTION=1920x1080x24
    volumes:
      - steam-data-2:/home/gamer/.steam
      - liftoff-mods-2:/home/gamer/.steam/steam/steamapps/common/Liftoff/BepInEx/plugins
    ports:
      - "127.0.0.1:6902:6901"
    shm_size: "2g"
    privileged: true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: liftoff-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../config/generated-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - desktop
      - desktop2
    restart: unless-stopped

volumes:
  steam-data:
    name: liftoff-steam-data
  liftoff-mods:
    name: liftoff-bepinex-mods
  steam-data-2:
    name: liftoff-steam-data-2
    external: true
  liftoff-mods-2:
    name: liftoff-bepinex-mods-2
    external: true
  certbot-webroot:
    name: liftoff-certbot
