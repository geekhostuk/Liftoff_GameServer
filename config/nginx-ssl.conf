# Upstream desktop
upstream desktop_backend {
    server desktop:6901;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

map $arg_token $token_valid {
    default 0;
    "${AUTH_TOKEN}" 1;
}

map $cookie_vnc_auth $cookie_valid {
    default 0;
    "${AUTH_TOKEN}" 1;
}

# HTTP -> HTTPS redirect + ACME challenges
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Auth endpoint
    location = /auth {
        if ($token_valid = 0) {
            return 403;
        }
        add_header Set-Cookie "vnc_auth=${AUTH_TOKEN}; Path=/; HttpOnly; SameSite=Strict; Secure" always;
        return 302 /vnc.html;
    }

    # All requests require valid token param OR valid cookie
    location / {
        set $access 0;
        if ($token_valid = 1) {
            set $access 1;
        }
        if ($cookie_valid = 1) {
            set $access 1;
        }
        if ($access = 0) {
            return 403;
        }

        add_header Set-Cookie "vnc_auth=${AUTH_TOKEN}; Path=/; HttpOnly; SameSite=Strict; Secure" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://${ADMIN_DOMAIN}" always;

        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://desktop_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
