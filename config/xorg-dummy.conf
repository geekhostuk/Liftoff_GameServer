Section "Device"
    Identifier "DummyDevice"
    Driver     "dummy"
    VideoRam   256000
EndSection

Section "Monitor"
    Identifier "DummyMonitor"
    # 1920x1080 @ 60Hz (from cvt 1920 1080 60)
    Modeline "1920x1080_60" 173.00  1920 2048 2248 2576  1080 1083 1088 1120 -hsync +vsync
    # 1920x1080 @ 30Hz (from cvt 1920 1080 30)
    Modeline "1920x1080_30" 79.75  1920 1976 2168 2416  1080 1083 1088 1102 -hsync +vsync
EndSection

Section "Screen"
    Identifier "DummyScreen"
    Device     "DummyDevice"
    Monitor    "DummyMonitor"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080_60" "1920x1080_30"
    EndSubSection
EndSection
