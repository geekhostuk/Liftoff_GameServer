# Upstream KasmVNC
upstream kasmvnc {
    server desktop:6901;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://${ADMIN_DOMAIN}" always;

    # Token-based authentication
    set $auth_valid 0;
    if ($arg_token = "${AUTH_TOKEN}") {
        set $auth_valid 1;
    }
    if ($auth_valid = 0) {
        return 403;
    }

    # Apply rate limiting
    limit_req zone=auth burst=10 nodelay;

    # Proxy to KasmVNC
    location / {
        proxy_pass http://kasmvnc;
        proxy_http_version 1.1;

        # WebSocket support (required for KasmVNC)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent desktop connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
