# Upstream desktop
upstream desktop_backend {
    server desktop:6901;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

map $arg_token $token_valid {
    default 0;
    "${AUTH_TOKEN}" 1;
}

map $cookie_vnc_auth $cookie_valid {
    default 0;
    "${AUTH_TOKEN}" 1;
}

server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoint — validates token and sets a session cookie
    location = /auth {
        if ($token_valid = 0) {
            return 403;
        }
        add_header Set-Cookie "vnc_auth=${AUTH_TOKEN}; Path=/; HttpOnly; SameSite=Strict" always;
        add_header X-Content-Type-Options nosniff always;
        return 302 /vnc.html;
    }

    # All other requests require either valid token param OR valid cookie
    location / {
        # Check token param first, then cookie
        set $access 0;
        if ($token_valid = 1) {
            set $access 1;
        }
        if ($cookie_valid = 1) {
            set $access 1;
        }
        if ($access = 0) {
            return 403;
        }

        # Set cookie on first access with token
        add_header Set-Cookie "vnc_auth=${AUTH_TOKEN}; Path=/; HttpOnly; SameSite=Strict" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://${ADMIN_DOMAIN} http://${ADMIN_DOMAIN}" always;

        # Rate limiting
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://desktop_backend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
