# Upstreams
upstream desktop1_backend {
    server desktop:6901;
}
upstream desktop2_backend {
    server desktop2:6901;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Server 1
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoint — validates token and sets session cookie, then redirects
    location = /auth {
        limit_req zone=auth burst=5 nodelay;

        if ($arg_token != "${AUTH_TOKEN}") {
            return 403;
        }

        add_header Set-Cookie "vnc_auth=${AUTH_TOKEN}; Path=/; HttpOnly; SameSite=None; Secure" always;
        return 302 /;
    }

    # All other requests — require valid session cookie
    location / {
        if ($cookie_vnc_auth != "${AUTH_TOKEN}") {
            return 403;
        }

        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://${ADMIN_DOMAIN} http://${ADMIN_DOMAIN}" always;

        proxy_pass http://desktop1_backend;
        proxy_http_version 1.1;
        proxy_hide_header X-Frame-Options;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# Server 2
