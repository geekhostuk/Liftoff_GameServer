[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

[program:pulseaudio]
command=pulseaudio --system --disallow-exit --disallow-module-loading
autorestart=true
priority=10
stdout_logfile=/var/log/pulseaudio.log
stderr_logfile=/var/log/pulseaudio.err

[program:xvfb]
command=Xorg %(ENV_DISPLAY)s -config /etc/X11/xorg-dummy.conf -ac +extension GLX +render -noreset
autorestart=true
priority=20
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.err

[program:xfce]
command=startxfce4
user=gamer
environment=DISPLAY="%(ENV_DISPLAY)s",HOME="/home/gamer",LIBGL_ALWAYS_SOFTWARE="1",GALLIUM_DRIVER="llvmpipe"
autorestart=true
priority=30
startsecs=5
startretries=3
stdout_logfile=/var/log/xfce.log
stderr_logfile=/var/log/xfce.err

[program:novnc]
command=/opt/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6901
user=gamer
environment=HOME="/home/gamer"
autorestart=true
priority=50
startsecs=3
startretries=5
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.err

[program:x11vnc]
command=x11vnc -display %(ENV_DISPLAY)s -rfbport 5900 -shared -forever -nopw -noxdamage -noshm -wait 5
user=gamer
environment=DISPLAY="%(ENV_DISPLAY)s",HOME="/home/gamer"
autorestart=true
priority=40
startsecs=3
startretries=5
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.err

[program:steam]
command=/usr/games/steam -no-browser +open steam://open/minigameslist
user=gamer
environment=DISPLAY="%(ENV_DISPLAY)s",HOME="/home/gamer",LIBGL_ALWAYS_SOFTWARE="1",GALLIUM_DRIVER="llvmpipe",PATH="/usr/games:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
autorestart=true
priority=60
startsecs=10
startretries=3
stdout_logfile=/var/log/steam.log
stderr_logfile=/var/log/steam.err
